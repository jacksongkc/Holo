name: e2e-scsi-gated

on:
  pull_request:
    types: [labeled]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  gated-smoke:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event.label.name == 'run-e2e'
    runs-on: [self-hosted, linux, privileged-scsi]
    steps:
      - uses: actions/checkout@v4
      - name: Verify harness gating
        run: bash tests/integration/test_gated_scsi_e2e.sh
      - name: Run privileged SCSI smoke
        run: make e2e-scsi
        env:
          HOLO_E2E_PORTAL: ${{ secrets.HOLO_E2E_PORTAL }}
          HOLO_E2E_IQN: ${{ secrets.HOLO_E2E_IQN }}
