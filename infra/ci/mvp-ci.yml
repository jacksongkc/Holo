name: mvp-ci

on:
  push:
  pull_request:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/lint-guardrails.sh

  control-plane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - run: cd control-plane && go test ./...
      - run: cd control-plane && go vet ./...

  data-plane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: data-plane
      - run: cd data-plane && cargo test --locked
      - run: cd data-plane && cargo clippy --locked --all-targets -- -D warnings

  static-analysis-extended:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: data-plane
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: cargo install cargo-audit --locked
      - run: bash scripts/static-analysis.sh

  web-console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-console/package-lock.json
      - run: cd web-console && npm ci
      - run: cd web-console && npm audit --audit-level=high
      - run: cd web-console && npm test
      - run: cd web-console && npm run build

  integration-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: data-plane
      - run: bash tests/integration/contract_smoke.sh
